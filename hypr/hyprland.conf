################
### MONITORS ###
################

monitor = eDP-1,1920x1080@60.02,0x0,1.0


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagencommand:workbench.trust.managet
exec-once = waybar
exec-once = hyprpaper


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    # NEON PINK & GREEN GRADIENT
    col.active_border = rgba(ff71ceee) rgba(00ff00ee) 45deg 135deg 225deg
    col.inactive_border = rgba(5b1a8eaa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 25
        render_power = 5
        color = rgba(ff71ce99)
        color_inactive = rgba(00ff0055)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.7
    }
}

animations {
    enabled = true

    bezier = overshoot, 0.05, 0.9, 0.1, 1.1
    bezier = linear, 0, 0, 1, 1
    bezier = snappy, 0.2, 1, 0.2, 1

    animation = windows, 1, 5, overshoot, popin 80%
    animation = workspaces, 1, 5, snappy, slide
    animation = border, 1, 5, snappy
    animation = borderangle, 1, 50, linear, loop
    animation = fade, 1, 4, snappy
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############

input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# ===== SCREENSHOTS =====
bind = SUPER_SHIFT, Print, exec, hyprshot -m output
bind = SUPER_SHIFT, Insert, exec, hyprshot -m window

# ===== PROGRAMS =====
bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, firefox
bind = $mainMod SHIFT, V, exec, mullvad-vpn
bind = $mainMod SHIFT, P, exec, systemctl shutdown

# ===== WINDOW MANAGEMENT =====
bind = $mainMod, X, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo,

# ===== SCRATCHPAD TERMINAL =====
# Toggle with Super+grave, fast access for commands
#bind = $mainMod, Q, togglespecialworkspace, scratch

# ===== FOCUS MOVEMENT (Arrow Keys + WASD) =====
bind = $mainMod, left, movefocus, l
bind = $mainMod, A, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, D, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, W, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, S, movefocus, d

# ===== WORKSPACES (1-10) =====
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ===== MOVE TO WORKSPACES =====
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ===== WORKSPACE NAVIGATION =====
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ===== WINDOW MOVE/RESIZE (Mouse) =====
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ===== VOLUME & BRIGHTNESS (Laptop Keys) =====
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ===== MEDIA CONTROL =====
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

