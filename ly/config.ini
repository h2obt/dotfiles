# Ly Login Manager Configuration

# Animation (hackerman vibes!)
animation = matrix
animation_frame_delay = 5
animation_timeout_sec = 0

# Language & Input
lang = en
default_input = login
input_len = 34

# Appearance
blank_box = true
hide_borders = false
hide_key_hints = false
hide_version_string = false

# Margins
margin_box_h = 2
margin_box_v = 1

# Clock (optional, kann auch null sein)
clock = null

# Vi-mode (optional)
vi_mode = false

# Save login state
save = true

# Numlock
numlock = false

# Auto-login (deaktiviert)
auto_login_user = null
auto_login_session = null

# Session paths
xsessions = /usr/share/xsessions
waylandsessions = /usr/share/wayland-sessions

# Commands
start_cmd = /etc/ly/startup.sh
setup_cmd = /etc/ly/setup.sh

# Power Management Keys
restart_key = F2
restart_cmd = /sbin/shutdown -r now
shutdown_key = F1
shutdown_cmd = /sbin/shutdown -a now
sleep_key = F3
sleep_cmd = null
hibernate_key = F4
hibernate_cmd = null

# Brightness
brightness_up_key = F6
brightness_up_cmd = /usr/bin/brightnessctl -q -n s +10%
brightness_down_key = F5
brightness_down_cmd =
